<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature Reformatter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sage: #A1BE95;
    --sage-dark: #7a9970;
    --sage-light: #d4e8cf;
    --cream: #F8F5EF;
    --ink: #2a2a2a;
    --muted: #6b6b6b;
    --raspberry: #ED5752;
    --panel: #ffffff;
    --border: #ddd8d0;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 1.5px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 1rem;
    background: var(--cream);
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    font-weight: 300;
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  header .tag {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--sage-dark);
    background: var(--sage-light);
    padding: 0.2em 0.6em;
    border-radius: 2px;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr auto;
    gap: 0;
    flex: 1;
    min-height: 0;
  }

  .panel {
    display: flex;
    flex-direction: column;
    border-right: 1.5px solid var(--border);
    min-height: 0;
  }

  .panel:last-child { border-right: none; }

  .panel-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--cream);
    flex-shrink: 0;
  }

  .panel-label {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .panel-label .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--sage);
  }

  .panel-label .dot.orange { background: #e8a26b; }
  .panel-label .dot.blue   { background: #92AAC7; }
  .panel-label .dot.red    { background: var(--raspberry); }

  textarea {
    flex: 1;
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    padding: 1.25rem 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    line-height: 1.7;
    background: var(--panel);
    color: var(--ink);
    tab-size: 2;
  }

  textarea::placeholder { color: #bbb; }

  .action-row {
    grid-column: 1 / -1;
    border-top: 1.5px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--cream);
  }

  button {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    cursor: pointer;
    border: none;
    border-radius: 3px;
    padding: 0.55rem 1.2rem;
    transition: all 0.15s ease;
  }

  .btn-primary {
    background: var(--sage);
    color: #fff;
  }

  .btn-primary:hover { background: var(--sage-dark); }

  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--sage); color: var(--sage-dark); }

  .btn-copy {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    margin-left: auto;
  }

  .btn-copy:hover { border-color: #92AAC7; color: #92AAC7; }

  .status {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    transition: color 0.3s;
  }

  .status.ok { color: var(--sage-dark); }
  .status.err { color: var(--raspberry); }

  /* Output panel specific */
  #output-area {
    background: #fafaf8;
  }

  .input-mode-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--cream);
    flex-shrink: 0;
  }

  .mode-tab {
    font-family: 'DM Mono', monospace;
    font-size: 0.63rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.5rem 1rem;
    cursor: pointer;
    border: none;
    border-bottom: 2px solid transparent;
    background: transparent;
    color: var(--muted);
    border-radius: 0;
    transition: all 0.15s;
    margin-bottom: -1px;
  }

  .mode-tab.active {
    color: var(--ink);
    border-bottom-color: var(--sage);
  }

  .mode-tab:hover:not(.active) { color: var(--sage-dark); }

  .url-input-row {
    display: none;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }

  .url-input-row.visible { display: flex; }

  .url-input-row input {
    flex: 1;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.4rem 0.75rem;
    outline: none;
    color: var(--ink);
    background: var(--cream);
    transition: border-color 0.15s;
  }

  .url-input-row input:focus { border-color: var(--sage); }
  .url-input-row input::placeholder { color: #bbb; }

  /* Preview row */
  .preview-row {
    grid-column: 1 / -1;
    border-top: 1px solid var(--border);
    display: none;
    flex-direction: column;
  }

  .preview-row.visible { display: flex; }

  .preview-header {
    padding: 0.75rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--cream);
  }

  .preview-frame {
    padding: 1.5rem;
    background: #fff;
    overflow: auto;
    max-height: 220px;
  }

  .divider-label {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    grid-column: 1 / -1;
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
    height: 32px;
  }

  .loading-dots::after {
    content: '';
    animation: dots 1.2s steps(4, end) infinite;
  }

  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
  }

  .panel-body {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    position: relative;
  }

  .overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(248,245,239,0.85);
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    z-index: 10;
    backdrop-filter: blur(1px);
  }

  .overlay.visible { display: flex; }
</style>
</head>
<body>

<header>
  <h1>Signature Reformatter</h1>
  <span class="tag">AI-Powered</span>
</header>

<div class="layout">

  <!-- Left: Original -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-label"><span class="dot orange"></span> Original Signature Code</span>
      <button class="btn-secondary" onclick="clearOriginal()">Clear</button>
    </div>
    <div class="input-mode-tabs">
      <button class="mode-tab active" id="tab-paste" onclick="switchMode('paste')">Paste Code</button>
      <button class="mode-tab" id="tab-url" onclick="switchMode('url')">Fetch from URL</button>
    </div>
    <div class="url-input-row" id="url-input-row">
      <input type="url" id="url-field" placeholder="https://example.com/signature.html" />
      <button class="btn-secondary" onclick="fetchUrl()">Fetch</button>
    </div>
    <div class="panel-body">
      <textarea id="original-area" placeholder="Paste your existing email signature HTML here…" spellcheck="false"></textarea>
      <div class="overlay" id="fetch-overlay">
        <span class="loading-dots">Fetching</span>
      </div>
    </div>
  </div>

  <!-- Right: Template -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-label"><span class="dot blue"></span> New Formatting Template</span>
      <button class="btn-secondary" onclick="clearPanel('template')">Clear</button>
    </div>
    <div class="panel-body">
      <textarea id="template-area" placeholder="Paste your new signature template here. Use placeholder names like {{name}}, {{title}}, {{email}}, {{phone}} or leave them blank — AI will figure out the mapping." spellcheck="false"></textarea>
    </div>
  </div>

  <!-- Action bar -->
  <div class="action-row">
    <button class="btn-primary" onclick="reformat()">⟳ Reformat Signature</button>
    <button class="btn-secondary" onclick="loadExample()">Load Example</button>
    <span class="status" id="status-msg"></span>
    <button class="btn-copy" id="copy-btn" onclick="copyOutput()" style="display:none;">Copy Output</button>
  </div>

  <!-- Divider -->
  <div class="divider-label">Output</div>

  <!-- Output full-width -->
  <div class="panel" style="grid-column: 1 / -1; border-right: none; min-height: 180px;">
    <div class="panel-header">
      <span class="panel-label"><span class="dot red"></span> Reformatted Result</span>
      <div style="display:flex;gap:0.5rem;">
        <button class="btn-secondary" id="preview-toggle" onclick="togglePreview()" style="display:none;">Show Preview</button>
        <button class="btn-secondary" onclick="clearOutput()">Clear</button>
      </div>
    </div>
    <div class="panel-body">
      <textarea id="output-area" placeholder="Your reformatted signature HTML will appear here…" spellcheck="false" readonly></textarea>
      <div class="overlay" id="loading-overlay">
        <span class="loading-dots">Reformatting</span>
      </div>
    </div>
  </div>

  <!-- Preview -->
  <div class="preview-row" id="preview-row" style="grid-column:1/-1;">
    <div class="preview-header">
      <span class="panel-label">Rendered Preview</span>
    </div>
    <div class="preview-frame" id="preview-frame"></div>
  </div>

</div>

<script>
const SYSTEM_PROMPT = `You are an expert HTML email signature developer. 
The user will give you two things:
1. ORIGINAL SIGNATURE: existing HTML email signature code with real contact information
2. NEW TEMPLATE: an HTML template with the desired formatting/layout

Your job is to extract all contact information from the original signature and insert it into the new template's formatting and structure, preserving the new template's styles, colors, fonts, and layout exactly.

Rules:
- Keep ALL styles from the NEW TEMPLATE — colors, fonts, spacing, structure
- Extract ALL information from the ORIGINAL — name, title, phone, email, address, social links, etc.
- CRITICAL — Images & Icons: Copy every <img src="..."> and every icon image URL from the ORIGINAL exactly as-is into the output. Never change, shorten, or placeholder any image src or icon href. The new signature uses the same hosted resources as the original.
- If the original has social media icons (LinkedIn, Twitter, etc.), include them in the output using their exact original src URLs and link hrefs.
- If the original has a logo image, include it using its exact original src URL.
- If the template has placeholder text like {{name}} or [Name], replace with the real value
- If the template has example values (like "Jane Doe"), replace with the real person's info
- If the template has placeholder images (like via.placeholder.com), replace them with the real image src from the original
- Output ONLY the final HTML signature code, nothing else. No explanation, no markdown fences.`;

async function reformat() {
  const original = document.getElementById('original-area').value.trim();
  const template = document.getElementById('template-area').value.trim();
  const status = document.getElementById('status-msg');

  if (!original || !template) {
    setStatus('Please fill in both panels first.', 'err');
    return;
  }

  const overlay = document.getElementById('loading-overlay');
  overlay.classList.add('visible');
  setStatus('');
  document.getElementById('copy-btn').style.display = 'none';
  document.getElementById('preview-toggle').style.display = 'none';
  document.getElementById('preview-row').classList.remove('visible');
  document.getElementById('output-area').value = '';

  const userMessage = `ORIGINAL SIGNATURE:\n${original}\n\nNEW TEMPLATE:\n${template}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: "user", content: userMessage }]
      })
    });

    const data = await response.json();

    if (data.error) throw new Error(data.error.message);

    const result = data.content
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('')
      .replace(/^```[a-z]*\n?/i, '')
      .replace(/```$/i, '')
      .trim();

    document.getElementById('output-area').value = result;
    document.getElementById('output-area').removeAttribute('readonly');

    setStatus('Done — output is editable.', 'ok');
    document.getElementById('copy-btn').style.display = '';
    document.getElementById('preview-toggle').style.display = '';

  } catch (err) {
    setStatus('Error: ' + err.message, 'err');
  } finally {
    overlay.classList.remove('visible');
  }
}

function setStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

function clearOriginal() {
  document.getElementById('original-area').value = '';
  document.getElementById('url-field').value = '';
}

function clearPanel(which) {
  document.getElementById(which === 'original' ? 'original-area' : 'template-area').value = '';
}

let currentMode = 'paste';
function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tab-paste').classList.toggle('active', mode === 'paste');
  document.getElementById('tab-url').classList.toggle('active', mode === 'url');
  document.getElementById('url-input-row').classList.toggle('visible', mode === 'url');
  if (mode === 'paste') {
    document.getElementById('original-area').placeholder = 'Paste your existing email signature HTML here…';
  } else {
    document.getElementById('original-area').placeholder = 'Fetched HTML will appear here (you can edit it before reformatting)…';
  }
}

async function fetchUrl() {
  const url = document.getElementById('url-field').value.trim();
  if (!url) { setStatus('Please enter a URL.', 'err'); return; }

  const overlay = document.getElementById('fetch-overlay');
  overlay.classList.add('visible');
  setStatus('Fetching URL…');

  try {
    // Use a CORS proxy to fetch the page
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const html = json.contents;
    if (!html) throw new Error('No content returned.');
    document.getElementById('original-area').value = html;
    setStatus('Fetched! Review or edit the code, then reformat.', 'ok');
    setTimeout(() => setStatus(''), 4000);
  } catch (err) {
    setStatus('Fetch failed: ' + err.message, 'err');
  } finally {
    overlay.classList.remove('visible');
  }
}

function clearOutput() {
  document.getElementById('output-area').value = '';
  document.getElementById('output-area').setAttribute('readonly', '');
  document.getElementById('copy-btn').style.display = 'none';
  document.getElementById('preview-toggle').style.display = 'none';
  document.getElementById('preview-row').classList.remove('visible');
  setStatus('');
}

async function copyOutput() {
  const text = document.getElementById('output-area').value;
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    setStatus('Copied to clipboard!', 'ok');
    setTimeout(() => setStatus(''), 2000);
  } catch {
    setStatus('Copy failed — please select & copy manually.', 'err');
  }
}

let previewVisible = false;
function togglePreview() {
  previewVisible = !previewVisible;
  const row = document.getElementById('preview-row');
  const btn = document.getElementById('preview-toggle');
  if (previewVisible) {
    const html = document.getElementById('output-area').value;
    document.getElementById('preview-frame').innerHTML = html;
    row.classList.add('visible');
    btn.textContent = 'Hide Preview';
  } else {
    row.classList.remove('visible');
    btn.textContent = 'Show Preview';
  }
}

function loadExample() {
  document.getElementById('original-area').value = `<table cellpadding="0" cellspacing="0" style="font-family:Arial,sans-serif;font-size:13px;color:#333;">
  <tr>
    <td style="padding-right:15px;border-right:2px solid #ccc;">
      <img src="https://via.placeholder.com/60" alt="Logo" width="60">
    </td>
    <td style="padding-left:15px;">
      <strong>Sarah Mitchell</strong><br>
      Senior UX Designer<br>
      Apex Creative Studio<br>
      <a href="mailto:sarah.mitchell@apexcreative.com">sarah.mitchell@apexcreative.com</a><br>
      p: (801) 555-0192<br>
      www.apexcreative.com
    </td>
  </tr>
</table>`;

  document.getElementById('template-area').value = `<table width="500" cellpadding="0" cellspacing="0" style="font-family:'Georgia',serif;border-top:3px solid #A1BE95;padding-top:12px;">
  <tr>
    <td>
      <p style="margin:0;font-size:17px;font-weight:bold;color:#2a2a2a;letter-spacing:0.5px;">{{Full Name}}</p>
      <p style="margin:2px 0 8px;font-size:12px;color:#A1BE95;text-transform:uppercase;letter-spacing:1px;">{{Title}} · {{Company}}</p>
      <p style="margin:0;font-size:12px;color:#555;">
        <a href="mailto:{{email}}" style="color:#7a9970;text-decoration:none;">{{email}}</a>
        &nbsp;|&nbsp;
        {{phone}}
      </p>
      <p style="margin:4px 0 0;font-size:11px;color:#999;">{{website}}</p>
    </td>
  </tr>
</table>`;

  setStatus('Example loaded — click Reformat Signature to try it!', 'ok');
  setTimeout(() => setStatus(''), 4000);
}
</script>
</body>
</html>
